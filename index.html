<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FX / CFD Image Dashboard</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: #111;
      color: #f5f5f5;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      padding: 16px;
    }

    .header { margin-bottom: 16px; }

    .header h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .header p {
      margin: 4px 0;
      color: #cfcfcf;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-areas:
        "fx-main fx-ca"
        "fx-aud  fx-ca"
        "cfd     cfd-a";
      gap: 16px;
      align-items: start;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(0,0,0,0.35);
    }

    .card-header {
      padding: 10px 12px;
      border-bottom: 1px solid #333;
      background: #202020;
    }

    .card-header h2 {
      margin: 0;
      font-size: 16px;
      line-height: 1.4;
    }

    .card-header .meta {
      margin-top: 4px;
      font-size: 12px;
      color: #bdbdbd;
      word-break: break-all;
    }

    .card-body { padding: 8px; }

    .card img {
      display: block;
      width: 100%;
      height: auto;
      background: #000;
      border-radius: 6px;
    }

    .fx-main { grid-area: fx-main; }
    .fx-aud  { grid-area: fx-aud; }
    .fx-ca   { grid-area: fx-ca; }
    .cfd     { grid-area: cfd; }
    .cfd-a   { grid-area: cfd-a; }

    .note {
      margin-top: 16px;
      padding: 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      font-size: 13px;
      color: #cfcfcf;
      line-height: 1.6;
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: 1fr;
        grid-template-areas:
          "fx-main"
          "fx-aud"
          "fx-ca"
          "cfd"
          "cfd-a";
      }
    }
  </style>
</head>
<body>
  <script>
    const password = "1111";
    const input = prompt("pw");
    if (input !== password) {
      document.write("denied");
      throw new Error("denied");
    }
  </script>

  <div class="page">
    <div class="header">
      <h1>FX / CFD Image Dashboard</h1>
      <p id="nowText">現在時刻を取得中...</p>
      <p id="deliveryText">配信済み画像を判定中...</p>
    </div>

    <div class="grid">
      <section class="card fx-main">
        <div class="card-header">
          <h2>1) FX Main</h2>
          <div class="meta" id="meta-fx-main">-</div>
        </div>
        <div class="card-body"><img id="img-fx-main" alt="FX Main" loading="lazy" /></div>
      </section>

      <section class="card fx-aud">
        <div class="card-header">
          <h2>2) FX AUD</h2>
          <div class="meta" id="meta-fx-aud">-</div>
        </div>
        <div class="card-body"><img id="img-fx-aud" alt="FX AUD" loading="lazy" /></div>
      </section>

      <section class="card fx-ca">
        <div class="card-header">
          <h2>3) FX Currency Analyzer</h2>
          <div class="meta" id="meta-fx-ca">-</div>
        </div>
        <div class="card-body"><img id="img-fx-ca" alt="FX Currency Analyzer" loading="lazy" /></div>
      </section>

      <section class="card cfd">
        <div class="card-header">
          <h2>4) CFD</h2>
          <div class="meta" id="meta-cfd">-</div>
        </div>
        <div class="card-body"><img id="img-cfd" alt="CFD" loading="lazy" /></div>
      </section>

      <section class="card cfd-a">
        <div class="card-header">
          <h2>5) CFD Analyzer</h2>
          <div class="meta" id="meta-cfda">-</div>
        </div>
        <div class="card-body"><img id="img-cfda" alt="CFD Analyzer" loading="lazy" /></div>
      </section>
    </div>

    <div class="note">
      配信ルール：FX は 6, 10, 14, 18, 22時。CFD はその1時間後の 7, 11, 15, 19, 23時。<br />
      FXは最新の配信済み時刻、CFDは現在時刻より前に配信済みの最新時刻を表示します。
    </div>
  </div>

  <script>
    const BASE_URL = "https://charts-archives.fx-funsoku.com/archives";
    const FX_HOURS = [6, 10, 14, 18, 22];
    const CFD_HOURS = [7, 11, 15, 19, 23];

    function pad(n) {
      return String(n).padStart(2, "0");
    }

    function formatDateParts(date) {
      const y = date.getFullYear();
      const m = pad(date.getMonth() + 1);
      const d = pad(date.getDate());
      return { ymd: `${y}-${m}-${d}` };
    }

    function formatDisplay(date) {
      const p = formatDateParts(date);
      return `${p.ymd} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
    }

    function getLatestDelivery(now, hours) {
      const h = now.getHours();
      const date = new Date(now);

      for (let i = hours.length - 1; i >= 0; i--) {
        if (h >= hours[i]) {
          date.setHours(hours[i], 0, 0, 0);
          return date;
        }
      }

      date.setDate(date.getDate() - 1);
      date.setHours(hours[hours.length - 1], 0, 0, 0);
      return date;
    }

    function buildImageUrl(dateObj, suffix) {
      const p = formatDateParts(dateObj);
      const hour = pad(dateObj.getHours());
      return `${BASE_URL}/${p.ymd}/${p.ymd}-${hour}H-${suffix}.jpg`;
    }

    function setImage(imgId, metaId, label, dateObj, suffix) {
      const url = buildImageUrl(dateObj, suffix);
      const img = document.getElementById(imgId);
      const meta = document.getElementById(metaId);

      img.src = url;
      img.alt = label;
      meta.textContent = `${formatDateParts(dateObj).ymd} ${pad(dateObj.getHours())}H`;

      img.onerror = function () {
        meta.textContent += " / 読み込み失敗";
      };
    }

    function init() {
      const now = new Date();
      const fxDate = getLatestDelivery(now, FX_HOURS);
      const cfdDate = getLatestDelivery(now, CFD_HOURS);

      document.getElementById("nowText").textContent = `現在時刻: ${formatDisplay(now)}`;
      document.getElementById("deliveryText").textContent = `表示中: FX ${formatDateParts(fxDate).ymd} ${pad(fxDate.getHours())}H / CFD ${formatDateParts(cfdDate).ymd} ${pad(cfdDate.getHours())}H`;

      setImage("img-fx-main", "meta-fx-main", "FX Main", fxDate, "Main");
      setImage("img-fx-aud", "meta-fx-aud", "FX AUD", fxDate, "AUD");
      setImage("img-fx-ca", "meta-fx-ca", "FX Currency Analyzer", fxDate, "CA");
      setImage("img-cfd", "meta-cfd", "CFD", cfdDate, "CFD");
      setImage("img-cfda", "meta-cfda", "CFD Analyzer", cfdDate, "CFDA");
    }

    init();
  </script>
</body>
</html>
